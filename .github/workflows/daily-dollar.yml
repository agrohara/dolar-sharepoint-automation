name: Buscar Cotação do Dólar Diariamente

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  fetch-dollar:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout do repositório
      uses: actions/checkout@v3
    
    - name: 🐍 Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 📦 Instalar dependências Python
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: 🔧 Instalar CLI Microsoft 365
      run: npm install -g @pnp/cli-microsoft365
    
    - name: 🔑 Login no Microsoft 365
      env:
        ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      run: m365 login --authType password --userName $ADMIN_USERNAME --password $ADMIN_PASSWORD
    
    - name: 💵 Executar script de cotação
      env:
        SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
        SHAREPOINT_LIST_NAME: ${{ secrets.SHAREPOINT_LIST_NAME }}
      run: python scripts/fetch_dollar.py
    
    - name: 🔓 Logout
      if: always()
      run: m365 logout
