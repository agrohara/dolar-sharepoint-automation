name: Buscar Cotação do Dólar Diariamente

on:
  workflow_dispatch:

jobs:
  fetch-dollar:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout do repositório
      uses: actions/checkout@v3
    
    - name: 🐍 Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 📦 Instalar dependências Python
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: 🔧 Instalar CLI Microsoft 365
      run: npm install -g @pnp/cli-microsoft365
    
    - name: 🔍 DIAGNÓSTICO - Listar todos os secrets
      env:
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        TENANT_ID: 044e0a4a-8936-4daa-becf-e0597208071c
      run: |
        echo "Verificando se as variáveis estão sendo passadas:"
        echo "CLIENT_ID está definido? ${{ secrets.CLIENT_ID != '' && 'SIM' || 'NÃO' }}"
        echo "CLIENT_SECRET está definido? ${{ secrets.CLIENT_SECRET != '' && 'SIM' || 'NÃO' }}"
        echo "TENANT_ID: 044e0a4a-8936-4daa-becf-e0597208071c"
    
    - name: 🔑 Tentar login
      env:
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        TENANT_ID: 044e0a4a-8936-4daa-becf-e0597208071c
      run: |
        m365 login --authType secret --appId $CLIENT_ID --tenant $TENANT_ID --secret $CLIENT_SECRET || echo "FALHA NO LOGIN"
    
    - name: 💵 Executar script de cotação
      env:
        SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
        SHAREPOINT_LIST_NAME: ${{ secrets.SHAREPOINT_LIST_NAME }}
      run: python scripts/fetch_dollar.py || echo "FALHA NO SCRIPT"
    
    - name: 🔓 Logout
      if: always()
      run: m365 logout
